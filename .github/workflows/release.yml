name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: |
          tar -czf "thymeleaf_ls-${{ github.ref_name }}-${{ matrix.target }}.tar.gz" \
            -C "target/${{ matrix.target }}/release" thymeleaf_ls

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: thymeleaf_ls-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
